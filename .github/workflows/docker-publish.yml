name: HolyClaude — Build & Push to Docker Hub + GHCR

run-name: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || github.workflow }}

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

concurrency:
  group: docker-${{ github.ref }}
  cancel-in-progress: true

env:
  DOCKERHUB_IMAGE: coderluii/holyclaude
  GHCR_IMAGE: ghcr.io/coderluii/holyclaude

# Required repository secrets:
# - DOCKERHUB_USERNAME: Docker Hub account that owns coderluii/holyclaude
# - DOCKERHUB_TOKEN: Docker Hub access token with read/write access to that repo
# - GHCR_TOKEN: GitHub token or PAT with package write access for ghcr.io/coderluii/holyclaude

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    strategy:
      max-parallel: 1
      matrix:
        variant: [slim, full]

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.3

      - name: Free up disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache
          sudo apt-get clean
          docker system prune -af
          df -h

      - name: Set up QEMU (multi-arch)
        uses: docker/setup-qemu-action@v4.1.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4.1.0

      - name: Login to Docker Hub
        uses: docker/login-action@v4.2.0
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Login to GHCR
        uses: docker/login-action@v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6.1.0
        with:
          images: |
            ${{ env.DOCKERHUB_IMAGE }}
            ${{ env.GHCR_IMAGE }}
          tags: |
            type=raw,value=latest,enable=${{ matrix.variant == 'full' }}
            type=raw,value=slim,enable=${{ matrix.variant == 'slim' }}
            type=semver,pattern={{version}},enable=${{ matrix.variant == 'full' }}
            type=semver,pattern={{version}}-slim,enable=${{ matrix.variant == 'slim' }}

      - name: Build and push
        uses: docker/build-push-action@v7.2.0
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VARIANT=${{ matrix.variant }}
          cache-from: type=gha,scope=${{ matrix.variant }}
          cache-to: type=gha,mode=max,scope=${{ matrix.variant }}

  update-dockerhub-description:
    runs-on: ubuntu-latest
    needs: build-and-push
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.3

      - name: Update Docker Hub description
        uses: peter-evans/dockerhub-description@v5.0.0
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          repository: coderluii/holyclaude
          short-description: "AI coding workstation: Claude Code + web UI + 7 AI CLIs + headless browser + 50+ tools"
          readme-filepath: ./docs/dockerhub-description.md
